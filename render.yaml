services:
  # BACKEND (Express Server)
  - type: web
    name: securitychat-backend
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: PORT
        value: 5000

  # FRONTEND (React App)
  - type: web
    name: securitychat-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
